{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - VOGX Salon</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>
    <div class="container">
        <div class="logo">VOGX Salon</div>
        <nav>
            <a href="/">Home</a>
            <a href="/services">Services</a>
            <a href="/bookings" id="bookingsLink" style="display:none;">My Bookings</a>
        </nav>
        <div class="auth-links">
            <button id="loginBtn" class="btn btn-secondary btn-sm" onclick="window.location.href='/login'" style="display:none;">Login</button>
            <div id="userMenu" style="display:none; display:flex; gap:1rem; align-items:center;">
                <span id="userName"></span>
                <button id="profileBtn" class="btn btn-secondary btn-sm" onclick="window.location.href='/profile'">Profile</button>
                <button id="logoutBtn" class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</header>

<main>
    <!-- Page Header -->
    <section style="background-color:#f9f9f9; padding:2rem 0;">
        <div class="container">
            <h1>Our Services</h1>
            <p class="text-muted">Browse and book our premium salon services</p>
        </div>
    </section>

    <!-- Services Section -->
    <section>
        <div class="container">
            <div style="margin-bottom:2rem;">
                <label for="categoryFilter" style="margin-right:1rem;">Filter by Category:</label>
                <select id="categoryFilter" onchange="filterByCategory()">
                    <option value="">All Categories</option>
                </select>
            </div>

            <div id="servicesList" class="grid grid-3">
                <!-- Services will be loaded here -->
            </div>

            <div class="text-center mt-4">
                <button id="loadMoreBtn" class="btn btn-secondary" onclick="loadMoreServices()" style="display:none;">Load More</button>
            </div>
        </div>
    </section>
</main>

<footer>
    <div class="container">
        <p>&copy; 2026 VOGX Salon. All rights reserved.</p>
    </div>
</footer>

<!-- Service Detail Modal -->
<div id="serviceModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="modalTitle"></h2>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script src="{% static 'js/api.js' %}"></script>
<script>
    let currentPage = 1;
    let selectedCategory = null;
    let categories = [];

    // Check authentication on page load
    async function checkAuth() {
        if (api.token) {
            try {
                const profile = await api.getProfile();
                document.getElementById('loginBtn').style.display = 'none';
                const userMenu = document.getElementById('userMenu');
                userMenu.style.display = 'flex';
                document.getElementById('userName').textContent = `Hi, ${profile.name}`;
                document.getElementById('bookingsLink').style.display = 'block';
            } catch (error) {
                api.clearToken();
            }
        } else {
            document.getElementById('loginBtn').style.display = 'block';
        }
    }

    // Load categories
    async function loadCategories() {
        try {
            const response = await api.getCategories();
            categories = response.results;
            const select = document.getElementById('categoryFilter');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                select.appendChild(option);
            });
        } catch (error) {
            console.error('Error loading categories:', error);
        }
    }

    // Load services
    async function loadServices() {
        try {
            const response = await api.getServices(currentPage, selectedCategory);
            const servicesList = document.getElementById('servicesList');
            
            if (currentPage === 1) {
                servicesList.innerHTML = '';
            }

            response.results.forEach(service => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-body">
                        <h3>${service.name}</h3>
                        <p class="text-muted">${service.category_name}</p>
                        <p>${service.description}</p>
                        <div style="margin-top:1rem;">
                            <p><strong>Price:</strong> ${formatPrice(service.price)}</p>
                            <p class="text-muted"><strong>Duration:</strong> ${service.duration_minutes} mins</p>
                        </div>
                    </div>
                    <div class="card-footer">
                        ${api.token ? `<button class="btn btn-primary btn-sm" onclick="bookService(${service.id}, '${service.name}', ${service.price}, ${service.duration_minutes})">Book Now</button>` : `<button class="btn btn-secondary btn-sm" onclick="window.location.href='/login'">Login to Book</button>`}
                    </div>
                `;
                servicesList.appendChild(card);
            });

            // Show/hide load more button
            if (response.next) {
                document.getElementById('loadMoreBtn').style.display = 'block';
            } else {
                document.getElementById('loadMoreBtn').style.display = 'none';
            }
        } catch (error) {
            console.error('Error loading services:', error);
        }
    }

    function filterByCategory() {
        selectedCategory = document.getElementById('categoryFilter').value;
        currentPage = 1;
        loadServices();
    }

    function loadMoreServices() {
        currentPage++;
        loadServices();
    }

    async function bookService(serviceId, serviceName, price, duration) {
        if (!api.token) {
            window.location.href = '/login';
            return;
        }

        const bookingDate = prompt('Enter booking date (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
        if (!bookingDate) return;

        const bookingTime = prompt('Enter booking time (HH:MM):', '10:00');
        if (!bookingTime) return;

        try {
            const booking = await api.createBooking(
                serviceId,
                bookingDate,
                bookingTime,
                'salon',
                ''
            );
            showAlert(`Booking created! ID: ${booking.id}`, 'success');
        } catch (error) {
            showAlert(`Booking failed: ${error.message}`, 'error');
        }
    }

    function closeModal() {
        document.getElementById('serviceModal').classList.remove('active');
    }

    async function logout() {
        try {
            await api.logout();
            api.clearToken();
            window.location.reload();
        } catch (error) {
            showAlert('Logout failed', 'error');
        }
    }

    // Initialize
    window.addEventListener('load', () => {
        checkAuth();
        loadCategories();
        loadServices();
    });
</script>

</body>
</html>
