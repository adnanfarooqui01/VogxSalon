{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrftoken" content="{{ csrf_token }}">
    <title>Services - VOGX Salon</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

{% csrf_token %}

<!-- HEADER -->
<header>
    <div style="display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; max-width: var(--container-max); margin: 0 auto; width: 100%;">
        <div class="logo">VOGX</div>
        
        <div class="gender-toggle" style="display: flex; gap: 0.5rem; background: var(--bg-page); padding: 0.4rem; border-radius: var(--radius-pill);">
            <button class="gender-btn active" onclick="setGender('men')">👨 Men</button>
            <button class="gender-btn" onclick="setGender('women')">👩 Women</button>
        </div>
        
        <div class="nav-right">
            <div class="cart-icon" onclick="window.location.href='/cart'">
                🛒
                <span class="cart-badge" id="cartBadge">0</span>
            </div>
            <button class="btn-login" id="loginBtn" onclick="window.location.href='/login'">Login</button>
            <div id="userMenu" style="display:none; display:flex; gap:1rem; align-items:center;">
                <span id="userName" style="font-weight: 600;"></span>
                <button class="btn-login" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</header>

<!-- CATEGORY PILLS (STICKY) -->
<div class="category-pills" id="categoryPills">
    <div class="pill active" data-category="packages" onclick="scrollToCategory('packages', event)">
        📦 Packages
    </div>
    <!-- Category pills will be added here -->
</div>

<!-- PACKAGES SECTION -->
<section class="section vertical-section" id="packages" style="scroll-margin-top: 160px;">
    <div class="section-header">
        <h2 class="vertical-section-title">Special Packages</h2>
    </div>
    <div class="scroll-container" id="packagesScroll">
        <!-- Packages loaded here -->
    </div>
</section>

<!-- CATEGORIES & SERVICES SECTIONS (Dynamic) -->
<div id="categorySections">
    <!-- Will be populated dynamically -->
</div>

<!-- FOOTER -->
<footer>
    <div class="footer-content">
        <div class="footer-section">
            <h4>VOGX Salon</h4>
            <p style="font-size: 0.9rem;">Premium at-home beauty services</p>
        </div>
        <div class="footer-section">
            <h4>Quick Links</h4>
            <a href="/">Home</a>
            <a href="/services">Services</a>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 VOGX Salon. All rights reserved.</p>
    </div>
</footer>

<script src="{% static 'js/api.js' %}"></script>
<script>
    let currentGender = 'men';
    let categories = [];

    async function checkAuth() {
        if (api.token) {
            try {
                const profile = await api.getProfile();
                document.getElementById('loginBtn').style.display = 'none';
                const userMenu = document.getElementById('userMenu');
                userMenu.style.display = 'flex';
                document.getElementById('userName').textContent = `Hi, ${profile.name}`;
            } catch (error) {
                api.clearToken();
            }
        }
    }

    function setGender(gender) {
        currentGender = gender;
        
        // Update buttons
        document.querySelectorAll('.gender-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        
        // Reload all content
        loadCategories();
    }

    async function loadCategories() {
        try {
            const response = await api.getCategories(currentGender);
            categories = response.results;
            
            // Update category pills
            const pillsDiv = document.getElementById('categoryPills');
            pillsDiv.innerHTML = `
                <div class="pill active" data-category="packages" onclick="scrollToCategory('packages', event)">
                    📦 Packages
                </div>
            `;
            
            categories.forEach(category => {
                const pill = document.createElement('div');
                pill.className = 'pill';
                pill.setAttribute('data-category', `category-${category.id}`);
                pill.textContent = category.name;
                pill.onclick = (e) => scrollToCategory(`category-${category.id}`, e);
                pillsDiv.appendChild(pill);
            });
            
            // Load packages
            await loadPackages();
            
            // Load sections for each category
            const sectionsDiv = document.getElementById('categorySections');
            sectionsDiv.innerHTML = '';
            
            for (const category of categories) {
                const servicesResponse = await api.getServices(1, category.id, currentGender);
                
                if (servicesResponse.results.length === 0) continue;
                
                const section = document.createElement('section');
                section.className = 'section vertical-section';
                section.id = `category-${category.id}`;
                section.style.scrollMarginTop = '160px';
                
                const titleDiv = document.createElement('h2');
                titleDiv.className = 'vertical-section-title';
                titleDiv.textContent = category.name;
                section.appendChild(titleDiv);
                
                const grid = document.createElement('div');
                grid.className = 'services-grid';
                
                servicesResponse.results.forEach(service => {
                    const card = document.createElement('div');
                    card.className = 'service-card';
                    card.onclick = () => window.location.href = `/service/${service.id}`;
                    card.innerHTML = `
                        <div class="service-card-image" style="background-color: var(--brand-primary); display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer;">
                            💇
                        </div>
                        <div class="service-card-body">
                            <div class="service-card-title">${service.name}</div>
                            <div class="service-card-price">${formatPrice(service.price)}</div>
                            <div class="service-card-duration">⏱️ ${service.duration_minutes}m</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
                section.appendChild(grid);
                sectionsDiv.appendChild(section);
            }
        } catch (error) {
            console.error('Error loading categories:', error);
        }
    }

    async function loadPackages() {
        try {
            const response = await api.getPackages(1, currentGender);
            const packagesScroll = document.getElementById('packagesScroll');
            packagesScroll.innerHTML = '';
            
            if (response.results.length === 0) {
                packagesScroll.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No packages available</p>';
                return;
            }
            
            response.results.forEach(pkg => {
                const servicesList = pkg.services.map(s => s.name).join(', ');
                const card = document.createElement('div');
                card.className = 'package-card';
                card.onclick = () => window.location.href = `/service/${pkg.services[0].id}`;
                card.innerHTML = `
                    <div class="package-card-image" style="background-color: var(--brand-primary); display: flex; align-items: center; justify-content: center; font-size: 3rem;">
                        📦
                    </div>
                    <div class="package-card-body">
                        <div class="package-card-title">${pkg.name}</div>
                        <div class="package-card-services">${servicesList}</div>
                        <div class="package-card-footer">
                            <div class="package-card-price">${formatPrice(pkg.package_price)}</div>
                            <button class="btn-add" onclick="addToCart('package', ${pkg.id}); event.stopPropagation();">Add +</button>
                        </div>
                    </div>
                `;
                packagesScroll.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading packages:', error);
        }
    }

    function scrollToCategory(categoryId, event) {
        // Update active pill
        document.querySelectorAll('.pill').forEach(pill => {
            pill.classList.remove('active');
        });
        event.target.classList.add('active');
        
        // Scroll to section
        const element = document.getElementById(categoryId);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    function addToCart(type, id) {
        if (!api.token) {
            window.location.href = '/login';
            return;
        }
        showAlert(`Added to cart!`, 'success');
    }

    async function logout() {
        try {
            await api.logout();
            api.clearToken();
            window.location.href = '/';
        } catch (error) {
            showAlert('Logout failed', 'error');
        }
    }

    // Initialize
    window.addEventListener('load', () => {
        checkAuth();
        loadCategories();
    });
</script>

</body>
</html>
