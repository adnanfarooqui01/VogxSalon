<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VogxSalon - Book Your Beauty Services{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        :root {
            --brand-primary: #ff6b9d;
            --brand-secondary: #c44569;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --text-muted: #b2bec3;
            --border-soft: #dfe6e9;
            --bg-light: #f5f6fa;
            --status-success-bg: #d4edda;
            --status-success-text: #155724;
            --status-danger-bg: #f8d7da;
            --status-danger-text: #721c24;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--text-primary);
            background: #fff;
            line-height: 1.6;
        }

        /* Navbar */
        .navbar {
            background: white;
            border-bottom: 1px solid var(--border-soft);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brand-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-center {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex: 1;
            justify-content: center;
        }

        .gender-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid var(--border-soft);
            background: white;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .gender-btn:hover {
            border-color: var(--brand-primary);
            color: var(--brand-primary);
        }

        .gender-btn.active {
            background: var(--brand-primary);
            border-color: var(--brand-primary);
            color: white;
        }

        #genderToggle {
            display: none;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--brand-secondary);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .auth-btn {
            padding: 0.6rem 1.5rem;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .auth-btn:hover {
            background: var(--brand-secondary);
        }

        .profile-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--brand-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Login Popup */
        .login-popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .login-popup-overlay.active {
            display: flex;
        }

        .login-popup {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .login-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .login-popup-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .login-popup-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .login-form-group {
            margin-bottom: 1.5rem;
        }

        .login-form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .login-form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .login-form-input:focus {
            outline: none;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
        }

        .login-error {
            display: none;
            background: var(--status-danger-bg);
            color: var(--status-danger-text);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .login-loading {
            display: none;
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .login-btn:hover {
            background: var(--brand-secondary);
        }

        .login-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .resend-countdown {
            display: none;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .countdown {
            font-weight: 700;
            color: var(--brand-primary);
        }

        /* Footer */
        footer {
            background: var(--bg-light);
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            border-top: 1px solid var(--border-soft);
            margin-top: 4rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        main {
            min-height: calc(100vh - 200px);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">💇 VogxSalon</a>
        
        <div class="navbar-center">
            <div id="genderToggle" style="display: none; gap: 1rem;">
                <button class="gender-btn" data-gender="men">👨 Men</button>
                <button class="gender-btn" data-gender="women">👩 Women</button>
            </div>
        </div>

        <div class="navbar-right">
            <div class="cart-icon-container" onclick="window.location.href='/cart'">
                🛒
                <span class="cart-badge" id="cartBadge">0</span>
            </div>
            <button class="auth-btn" id="loginBtn" onclick="openLoginPopup()">Login</button>
            <div class="profile-icon" id="profileIcon" onclick="window.location.href='/profile'" style="display: none;"></div>
        </div>
    </nav>

    <!-- Login Popup -->
    <div class="login-popup-overlay" id="loginPopupOverlay">
        <div class="login-popup">
            <div class="login-popup-header">
                <h2 class="login-popup-title">Login</h2>
                <button class="login-popup-close" onclick="closeLoginPopup()">✕</button>
            </div>

            <div id="loginError" class="login-error"></div>
            <div id="loginLoading" class="login-loading">Sending OTP...</div>

            <!-- Step 1: Phone Entry -->
            <form id="phoneForm" onsubmit="submitPhoneForm(event)">
                <div class="login-form-group">
                    <label class="login-form-label">Phone Number</label>
                    <input type="tel" id="phoneInput" class="login-form-input" placeholder="10-digit number" maxlength="10" required>
                </div>
                <button type="submit" class="login-btn">Send OTP</button>
            </form>

            <!-- Step 2: OTP Entry -->
            <form id="otpForm" onsubmit="submitOTPForm(event)" style="display: none;">
                <div class="login-form-group">
                    <label class="login-form-label">OTP Code</label>
                    <input type="text" id="otpInput" class="login-form-input" placeholder="6-digit code" maxlength="6" required>
                </div>
                <div class="login-form-group">
                    <label class="login-form-label">Name (optional)</label>
                    <input type="text" id="nameInput" class="login-form-input" placeholder="Your name">
                </div>
                <button type="submit" class="login-btn">Verify & Login</button>
                <div style="text-align: center; margin-top: 1rem;">
                    <button type="button" id="resendBtn" onclick="resendOTP()" class="login-btn" style="background: var(--text-muted);">Resend OTP</button>
                    <div id="resendCountdown" class="resend-countdown">
                        Resend in <span id="countdown">30</span>s
                    </div>
                </div>
            </form>
        </div>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 VogxSalon. All rights reserved.</p>
    </footer>

    <script>
        // API Configuration
        const API_BASE = '/api';
        let api = null;

        async function initializeAPI() {
            if (!api) {
                api = {
                    token: localStorage.getItem('auth_token'),
                    
                    async request(endpoint, method = 'GET', data = null) {
                        const options = {
                            method,
                            headers: {
                                'Content-Type': 'application/json',
                            }
                        };

                        if (this.token) {
                            options.headers['Authorization'] = `Token ${this.token}`;
                        }

                        if (data) {
                            options.body = JSON.stringify(data);
                        }

                        const response = await fetch(`${API_BASE}${endpoint}`, options);
                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.detail || errorData.message || 'Request failed');
                        }
                        return await response.json();
                    },

                    async sendOTP(phone) {
                        return this.request('/auth/send-otp/', 'POST', { phone });
                    },

                    async verifyOTP(phone, otp, name) {
                        const response = await this.request('/auth/verify-otp/', 'POST', { phone, otp, name });
                        this.token = response.token;
                        return response;
                    },

                    async getProfile() {
                        return this.request('/auth/profile/', 'GET');
                    },

                    async logout() {
                        return this.request('/auth/logout/', 'POST');
                    },

                    async getServices(page = 1, category = null, gender = null) {
                        let url = `/services/services/?page=${page}`;
                        if (category) url += `&category=${category}`;
                        if (gender) url += `&gender=${gender}`;
                        return this.request(url);
                    },

                    async getCategories(gender = null) {
                        let url = '/services/categories/?is_active=true';
                        if (gender) url += `&gender=${gender}`;
                        return this.request(url);
                    },

                    async getPackages(gender = null) {
                        let url = '/services/packages/?is_available=true';
                        if (gender) url += `&gender=${gender}`;
                        return this.request(url);
                    },

                    async getTimeSlots(serviceId, date) {
                        return this.request(`/bookings/time-slots/?service=${serviceId}&date=${date}`);
                    },

                    async createBooking(bookingData) {
                        return this.request('/bookings/bookings/', 'POST', bookingData);
                    },

                    setToken(token) {
                        this.token = token;
                        localStorage.setItem('auth_token', token);
                    },

                    clearToken() {
                        this.token = null;
                        localStorage.removeItem('auth_token');
                    }
                };
            }
            return api;
        }

        /**
         * Update navbar auth state
         */
        async function updateNavbarAuthState() {
            const token = localStorage.getItem('auth_token');
            const loginBtn = document.getElementById('loginBtn');
            const profileIcon = document.getElementById('profileIcon');

            if (!token) {
                // Logged out
                if (loginBtn) loginBtn.style.display = 'block';
                if (profileIcon) profileIcon.style.display = 'none';
            } else {
                // Logged in
                if (loginBtn) loginBtn.style.display = 'none';
                if (profileIcon) {
                    profileIcon.style.display = 'flex';
                    try {
                        const apiInstance = await initializeAPI();
                        const profile = await apiInstance.getProfile();
                        profileIcon.textContent = profile.name ? profile.name[0].toUpperCase() : '👤';
                    } catch (error) {
                        profileIcon.textContent = '👤';
                    }
                }
            }
        }

        /**
         * Open login popup
         */
        function openLoginPopup() {
            const overlay = document.getElementById('loginPopupOverlay');
            if (overlay) {
                overlay.classList.add('active');
                document.getElementById('phoneForm').style.display = 'block';
                document.getElementById('otpForm').style.display = 'none';
                document.getElementById('phoneInput').value = '';
                document.getElementById('otpInput').value = '';
                document.getElementById('nameInput').value = '';
                document.getElementById('loginError').style.display = 'none';
            }
        }

        /**
         * Close login popup
         */
        function closeLoginPopup() {
            const overlay = document.getElementById('loginPopupOverlay');
            if (overlay) {
                overlay.classList.remove('active');
            }
        }

        /**
         * Submit phone form
         */
        async function submitPhoneForm(event) {
            event.preventDefault();
            const phone = document.getElementById('phoneInput').value.trim();
            const errorDiv = document.getElementById('loginError');
            const loadingDiv = document.getElementById('loginLoading');
            const submitBtn = document.querySelector('#phoneForm button[type="submit"]');

            if (!/^\d{10}$/.test(phone)) {
                errorDiv.textContent = 'Please enter a valid 10-digit phone number';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                loadingDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                if (submitBtn) submitBtn.disabled = true;

                const apiInstance = await initializeAPI();
                await apiInstance.sendOTP(phone);

                sessionStorage.setItem('login_phone', phone);
                document.getElementById('phoneForm').style.display = 'none';
                document.getElementById('otpForm').style.display = 'block';
                startResendCountdown();
            } catch (error) {
                errorDiv.textContent = error.message || 'Could not send OTP. Try again.';
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                if (submitBtn) submitBtn.disabled = false;
            }
        }

        /**
         * Submit OTP form
         */
        async function submitOTPForm(event) {
            event.preventDefault();
            const phone = sessionStorage.getItem('login_phone');
            const otp = document.getElementById('otpInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();
            const errorDiv = document.getElementById('loginError');
            const loadingDiv = document.getElementById('loginLoading');
            const submitBtn = document.querySelector('#otpForm button[type="submit"]');

            if (!/^\d{4,6}$/.test(otp)) {
                errorDiv.textContent = 'Please enter a valid OTP';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                loadingDiv.style.display = 'block';
                errorDiv.style.display = 'none';
                if (submitBtn) submitBtn.disabled = true;

                const apiInstance = await initializeAPI();
                const response = await apiInstance.verifyOTP(phone, otp, name);
                
                localStorage.setItem('auth_token', response.token);
                updateNavbarAuthState();
                updateCartBadge();
                closeLoginPopup();

                if (window.onLoginSuccess) {
                    window.onLoginSuccess();
                    window.onLoginSuccess = null;
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'OTP verification failed. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                if (submitBtn) submitBtn.disabled = false;
            }
        }

        /**
         * Resend OTP with cooldown
         */
        async function resendOTP() {
            const phone = sessionStorage.getItem('login_phone');
            const errorDiv = document.getElementById('loginError');

            if (!phone) {
                errorDiv.textContent = 'Session expired. Please start over.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const apiInstance = await initializeAPI();
                await apiInstance.sendOTP(phone);
                errorDiv.style.display = 'none';
                startResendCountdown();
            } catch (error) {
                errorDiv.textContent = error.message || 'Could not resend OTP. Try again.';
                errorDiv.style.display = 'block';
            }
        }

        /**
         * Start 30-second countdown before allowing resend
         */
        function startResendCountdown() {
            let seconds = 30;
            const resendBtn = document.getElementById('resendBtn');
            const resendCountdown = document.getElementById('resendCountdown');
            const countdown = document.getElementById('countdown');

            if (resendBtn) resendBtn.style.display = 'none';
            if (resendCountdown) resendCountdown.style.display = 'inline';

            const interval = setInterval(() => {
                seconds--;
                if (countdown) countdown.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    if (resendCountdown) resendCountdown.style.display = 'none';
                    if (resendBtn) resendBtn.style.display = 'inline-block';
                }
            }, 1000);
        }

        /**
         * Update cart badge count
         */
        function updateCartBadge() {
            const cart = getCart();
            const badge = document.getElementById('cartBadge');
            if (badge) {
                badge.textContent = cart.length;
            }
        }

        /**
         * Get cart from localStorage
         */
        function getCart() {
            const cartJSON = localStorage.getItem('vogx_cart');
            return cartJSON ? JSON.parse(cartJSON) : [];
        }

        /**
         * Setup gender toggle buttons
         */
        function setupGenderToggle() {
            const genderToggle = document.getElementById('genderToggle');
            if (!genderToggle) return;

            const isServicesPage = window.location.pathname.includes('/services');
            if (isServicesPage) {
                genderToggle.style.display = 'flex';
                const buttons = genderToggle.querySelectorAll('.gender-btn');
                buttons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        const gender = this.dataset.gender;
                        window.location.href = `/services?gender=${gender}`;
                    });
                });

                const params = new URLSearchParams(window.location.search);
                const currentGender = params.get('gender') || 'men';
                buttons.forEach(btn => {
                    if (btn.dataset.gender === currentGender) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
        }

        /**
         * Logout user
         */
        async function logout() {
            try {
                const apiInstance = await initializeAPI();
                await apiInstance.logout();
            } catch (error) {
                console.log('Logout request failed:', error);
            }
            localStorage.removeItem('auth_token');
            updateNavbarAuthState();
            window.location.href = '/';
        }

        /**
         * Login if needed (for adding to cart, etc)
         */
        function loginIfNeeded(callback) {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.onLoginSuccess = callback;
                openLoginPopup();
            } else {
                callback();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializeAPI();
            updateNavbarAuthState();
            updateCartBadge();
            setupGenderToggle();
        });

        // Close popup when clicking outside
        document.addEventListener('click', function(event) {
            const overlay = document.getElementById('loginPopupOverlay');
            if (event.target === overlay) {
                closeLoginPopup();
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
