

<div class="vlp-overlay" id="loginOverlay">
  <div class="vlp-popup" role="dialog" aria-modal="true" aria-labelledby="vlpTitle">
    <button type="button" class="vlp-close" onclick="closeLogin()" aria-label="Close">&times;</button>

    <div class="vlp-logo" id="vlpTitle">VOGX</div>
    <p class="vlp-sub">Login to book trusted professionals at your doorstep</p>

    <div id="vlpError" class="vlp-msg error" role="alert" style="display:none;"></div>
    <div id="vlpSuccess" class="vlp-msg success" role="status" style="display:none;"></div>

    <!-- STEP 1 — phone number -->
    <div class="vlp-step active" id="phoneStep">
      <form onsubmit="handlePhoneSubmit(event)" novalidate>
        <div class="vlp-field">
          <label for="vlpPhone">Phone number</label>
          <div class="vlp-phone-row">
            <span class="vlp-cc">+91</span>
            <input type="tel" id="vlpPhone" placeholder="98765 43210" inputmode="numeric" maxlength="10" autocomplete="tel" required>
          </div>
        </div>

        <!-- Firebase invisible reCAPTCHA mounts here -->
        <div id="recaptcha-container"></div>

        <button type="submit" class="vlp-btn-primary" id="sendOtpBtn">
          <span id="sendOtpText">Send OTP</span>
          <span id="sendOtpLoader" class="vlp-loading" style="display:none;" aria-hidden="true"></span>
        </button>
      </form>
    </div>

    <!-- STEP 2 — OTP verification -->
    <div class="vlp-step" id="otpStep">
      <p class="vlp-otp-sent" id="otpPhone">Sent to +91 XXXXXXXXXX</p>
      <form onsubmit="handleOTPSubmit(event)" novalidate>
        <div class="vlp-field">
          <label>Enter OTP</label>
          <div class="vlp-otp-inputs" id="otpInputs">
            <input type="text" class="vlp-otp-input" maxlength="1" inputmode="numeric" required>
            <input type="text" class="vlp-otp-input" maxlength="1" inputmode="numeric" required>
            <input type="text" class="vlp-otp-input" maxlength="1" inputmode="numeric" required>
            <input type="text" class="vlp-otp-input" maxlength="1" inputmode="numeric" required>
            <input type="text" class="vlp-otp-input" maxlength="1" inputmode="numeric" required>
            <input type="text" class="vlp-otp-input" maxlength="1" inputmode="numeric" required>
          </div>
        </div>

        <button type="submit" class="vlp-btn-primary" id="verifyOtpBtn">
          <span id="verifyOtpText">Verify &amp; Login</span>
          <span id="verifyOtpLoader" class="vlp-loading" style="display:none;" aria-hidden="true"></span>
        </button>
      </form>

      <div class="vlp-resend-row">
        <span>Didn't receive?</span>
        <button type="button" id="resendBtn" onclick="resendOTP()">Resend OTP</button>
      </div>
      <a class="vlp-back-link" onclick="goBackToPhone()"><span>&larr; Change number</span></a>
    </div>
  </div>
</div>

<style>
  /* Namespaced "vlp-" (Vogx Login Popup) so this never collides with the
     host page's own CSS. Falls back to sensible defaults if the host page
     hasn't defined the --brand / --gray-* custom properties. */
  .vlp-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 1000;
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .vlp-overlay.open { display: flex; }

  .vlp-popup {
    background: var(--white, #fff);
    border-radius: var(--radius, 12px);
    width: 100%; max-width: 380px;
    padding: 32px 28px;
    position: relative;
    box-shadow: var(--shadow-md, 0 4px 24px rgba(0,0,0,.12));
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .vlp-close {
    position: absolute; top: 14px; right: 14px;
    width: 30px; height: 30px; border-radius: 50%;
    border: none; background: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gray-3, #999); font-size: 20px; line-height: 1;
    transition: background .2s ease, color .2s ease;
  }
  .vlp-close:hover { background: var(--gray-5, #f5f5f5); color: var(--gray-1, #333); }

  .vlp-logo { text-align: center; margin-bottom: 4px; font-size: 22px; font-weight: 800; color: var(--brand, #c2185b); }
  .vlp-sub  { text-align: center; font-size: 13px; color: var(--gray-2, #666); margin-bottom: 24px; }

  .vlp-step { display: none; }
  .vlp-step.active { display: block; }

  .vlp-field { margin-bottom: 16px; }
  .vlp-field label {
    display: block; font-size: 12px; font-weight: 600; color: var(--gray-2, #666);
    margin-bottom: 6px; letter-spacing: .03em; text-transform: uppercase;
  }
  .vlp-field input {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid var(--gray-4, #ccc); border-radius: var(--radius-sm, 8px);
    font-size: 15px; color: var(--black, #111); background: var(--white, #fff);
    transition: border-color .2s ease;
  }
  .vlp-field input:focus { outline: none; border-color: var(--brand, #c2185b); }

  .vlp-phone-row { display: flex; gap: 8px; }
  .vlp-cc {
    flex-shrink: 0; padding: 13px 12px;
    border: 1.5px solid var(--gray-4, #ccc); border-radius: var(--radius-sm, 8px);
    font-size: 15px; color: var(--gray-2, #666); background: var(--gray-5, #f5f5f5);
    display: flex; align-items: center;
  }
  .vlp-phone-row input { flex: 1; }

  .vlp-otp-sent { text-align: center; font-size: 13px; color: var(--gray-2, #666); margin-bottom: 18px; }
  .vlp-otp-inputs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .vlp-otp-input {
    width: 100%; height: 48px; text-align: center; font-size: 20px; font-weight: 700;
    border: 1.5px solid var(--gray-4, #ccc); border-radius: var(--radius-sm, 8px); color: var(--black, #111);
  }
  .vlp-otp-input:focus { outline: none; border-color: var(--brand, #c2185b); }

  .vlp-btn-primary {
    width: 100%; padding: 14px; margin-top: 6px;
    background: var(--brand, #c2185b); color: #fff; border: none;
    border-radius: 24px; font-size: 15px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .2s ease;
  }
  .vlp-btn-primary:hover:not(:disabled) { background: var(--brand-dark, #880e4f); }
  .vlp-btn-primary:disabled { opacity: .7; cursor: not-allowed; }

  .vlp-loading {
    width: 16px; height: 16px; border: 2px solid #fff; border-radius: 50%;
    border-top-color: transparent; animation: vlpspin .8s linear infinite;
  }
  @keyframes vlpspin { to { transform: rotate(360deg); } }

  .vlp-msg { font-size: 13px; text-align: center; margin-bottom: 14px; padding: 8px 10px; border-radius: 6px; }
  .vlp-msg.error   { background: #fdecea; color: #c62828; }
  .vlp-msg.success { background: #e8f5e9; color: #2e7d32; }

  .vlp-resend-row {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 16px; font-size: 13px; color: var(--gray-2, #666);
  }
  .vlp-resend-row button {
    border: none; background: none; color: var(--brand, #c2185b);
    font-weight: 600; font-size: 13px; cursor: pointer; padding: 0;
  }
  .vlp-back-link { display: block; text-align: center; margin-top: 12px; font-size: 13px; color: var(--gray-3, #999); cursor: pointer; }

  #recaptcha-container { margin-bottom: 2px; }

  @media (max-width: 480px) {
    .vlp-popup { padding: 26px 18px; }
    .vlp-otp-input { height: 42px; font-size: 18px; }
  }
</style>

<script>
(function () {
  /* ── Firebase config (same context vars as login.html) ──────────── */
  const firebaseConfig = {
    apiKey:            "{{ FIREBASE_API_KEY }}",
    authDomain:         "{{ FIREBASE_AUTH_DOMAIN }}",
    projectId:          "{{ FIREBASE_PROJECT_ID }}",
    storageBucket:      "{{ FIREBASE_STORAGE_BUCKET }}",
    messagingSenderId:  "{{ FIREBASE_MESSAGING_SENDER_ID }}",
    appId:              "{{ FIREBASE_APP_ID }}"
  };

  let auth = null;
  let verificationId = '';

  /* ── lazy-load Firebase SDK (only once, even if this component ends
        up on several pages across a session) ─────────────────────── */
  function loadFirebaseSdk() {
    if (window.firebase && window.firebase.app) return Promise.resolve();
    if (window._vlpFirebaseLoading) return window._vlpFirebaseLoading;
    window._vlpFirebaseLoading = new Promise((resolve, reject) => {
      const s1 = document.createElement('script');
      s1.src = 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js';
      s1.onload = () => {
        const s2 = document.createElement('script');
        s2.src = 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js';
        s2.onload = resolve;
        s2.onerror = () => reject(new Error('Failed to load Firebase Auth SDK'));
        document.head.appendChild(s2);
      };
      s1.onerror = () => reject(new Error('Failed to load Firebase SDK'));
      document.head.appendChild(s1);
    });
    return window._vlpFirebaseLoading;
  }

  function initFirebase() {
    if (auth) return Promise.resolve();
    return loadFirebaseSdk().then(() => {
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
    });
  }

  function getCsrfToken() {
    const meta = document.querySelector('meta[name="csrftoken"]');
    if (meta && meta.getAttribute('content')) return meta.getAttribute('content');
    const m = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
    return m ? decodeURIComponent(m[1]) : '';
  }

  /* ── open / close ─────────────────────────────────────────────── */
  window.openLogin = function () {
    document.getElementById('loginOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    showStep('phoneStep');
    document.getElementById('vlpPhone').value = '';
    document.querySelectorAll('.vlp-otp-input').forEach(i => i.value = '');
    initFirebase().catch(() => showError('Could not initialize login. Please refresh and try again.'));
    setTimeout(() => document.getElementById('vlpPhone')?.focus(), 100);
  };

  window.closeLogin = function () {
    document.getElementById('loginOverlay').classList.remove('open');
    document.body.style.overflow = '';
  };

  document.getElementById('loginOverlay').addEventListener('click', e => {
    if (e.target.id === 'loginOverlay') closeLogin();
  });

  function showStep(id) {
    document.querySelectorAll('.vlp-step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    clearMessages();
  }
  function clearMessages() {
    document.getElementById('vlpError').style.display = 'none';
    document.getElementById('vlpSuccess').style.display = 'none';
  }
  function showError(msg) {
    document.getElementById('vlpSuccess').style.display = 'none';
    const el = document.getElementById('vlpError');
    el.textContent = msg; el.style.display = 'block';
  }
  function showSuccess(msg) {
    document.getElementById('vlpError').style.display = 'none';
    const el = document.getElementById('vlpSuccess');
    el.textContent = msg; el.style.display = 'block';
  }

  /* ── step 1: send OTP ─────────────────────────────────────────── */
  window.handlePhoneSubmit = async function (e) {
    e.preventDefault();
    if (!auth) await initFirebase().catch(() => {});
    if (!auth) { showError('Login is still initializing. Please wait a moment and try again.'); return; }

    const raw = document.getElementById('vlpPhone').value.trim();
    if (!/^\d{10}$/.test(raw)) { showError('Enter a valid 10-digit phone number'); return; }

    const btn = document.getElementById('sendOtpBtn');
    btn.disabled = true;
    document.getElementById('sendOtpText').style.display = 'none';
    document.getElementById('sendOtpLoader').style.display = 'inline-block';

    try {
      clearMessages();
      const formattedPhone = '+91' + raw;

      if (!window.recaptchaVerifier) {
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
      }

      const confirmationResult = await auth.signInWithPhoneNumber(formattedPhone, window.recaptchaVerifier);
      verificationId = confirmationResult.verificationId;

      document.getElementById('otpPhone').textContent = `Sent to ${formattedPhone}`;
      showStep('otpStep');
      showSuccess('OTP sent successfully!');
      setTimeout(() => document.querySelector('.vlp-otp-input')?.focus(), 100);
    } catch (err) {
      let msg = err.message || 'Failed to send OTP. Please try again.';
      if (err.code === 'auth/too-many-requests')   msg = 'Too many requests. Please try again later.';
      if (err.code === 'auth/invalid-phone-number') msg = 'Invalid phone number. Please check and try again.';
      showError(msg);
    } finally {
      btn.disabled = false;
      document.getElementById('sendOtpText').style.display = 'inline';
      document.getElementById('sendOtpLoader').style.display = 'none';
    }
  };

  /* ── step 2: verify OTP ───────────────────────────────────────── */
  window.handleOTPSubmit = async function (e) {
    e.preventDefault();
    const inputs = document.querySelectorAll('.vlp-otp-input');
    const otp = Array.from(inputs).map(i => i.value).join('');
    if (otp.length !== 6) { showError('Please enter a valid 6-digit OTP'); return; }

    const btn = document.getElementById('verifyOtpBtn');
    btn.disabled = true;
    document.getElementById('verifyOtpText').style.display = 'none';
    document.getElementById('verifyOtpLoader').style.display = 'inline-block';

    try {
      clearMessages();
      const credential = firebase.auth.PhoneAuthProvider.credential(verificationId, otp);
      const result = await auth.signInWithCredential(credential);
      const idToken = await result.user.getIdToken();

      const response = await fetch('/api/auth/verify-firebase-token/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken() },
        body: JSON.stringify({ idToken, name: result.user.phoneNumber })
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.detail || errData.error || 'Authentication failed');
      }

      const data = await response.json();
      if (data.token) {
        localStorage.setItem('auth_token', data.token);
        showSuccess('Login successful!');

        // let any host page react without a hard reload
        window.dispatchEvent(new CustomEvent('vogx:login', { detail: { token: data.token, user: data.user } }));
        if (typeof window.updateNavbar === 'function') window.updateNavbar();
        if (typeof window.updateCartBadge === 'function') window.updateCartBadge();
        if (typeof window.toast === 'function') {
          window.toast(`Welcome${data.user?.name ? ', ' + data.user.name : ''}!`, 'success');
        }
        setTimeout(closeLogin, 600);
      }
    } catch (err) {
      let msg = err.message || 'Invalid OTP. Please try again.';
      if (err.code === 'auth/invalid-verification-code') msg = 'Invalid OTP. Please check and try again.';
      if (err.code === 'auth/code-expired')               msg = 'OTP expired. Please request a new one.';
      showError(msg);
    } finally {
      btn.disabled = false;
      document.getElementById('verifyOtpText').style.display = 'inline';
      document.getElementById('verifyOtpLoader').style.display = 'none';
    }
  };

  window.goBackToPhone = function () {
    showStep('phoneStep');
    document.querySelectorAll('.vlp-otp-input').forEach(i => i.value = '');
  };

  window.resendOTP = function () {
    goBackToPhone();
    showSuccess("You can now request a new OTP");
    setTimeout(() => document.getElementById('vlpPhone')?.focus(), 50);
  };

  /* ── OTP box auto-advance / backspace ─────────────────────────── */
  document.querySelectorAll('.vlp-otp-input').forEach((input, index, all) => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && input.value === '' && index > 0) all[index - 1].focus();
    });
    input.addEventListener('input', e => {
      e.target.value = e.target.value.replace(/[^0-9]/g, '');
      if (e.target.value.length === 1 && index < all.length - 1) all[index + 1].focus();
    });
  });
})();
</script>
