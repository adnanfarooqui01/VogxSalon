{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrftoken" content="{{ csrf_token }}">
    <title>Login - VOGX Salon</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        .login-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            background: white;
        }
        
        .login-left {
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-primary-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            padding: 2rem;
        }
        
        .login-left h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .login-left p {
            font-size: 1.1rem;
            text-align: center;
            opacity: 0.9;
            max-width: 400px;
        }
        
        .login-right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .login-form {
            width: 100%;
            max-width: 400px;
        }
        
        .login-form h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .login-form p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(179, 23, 78, 0.1);
        }
        
        .otp-inputs {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .otp-input {
            width: 100%;
            height: 45px;
            font-size: 1.5rem;
            text-align: center;
            border: 2px solid var(--border-soft);
            border-radius: var(--radius-md);
            font-weight: 700;
        }
        
        .otp-input:focus {
            outline: none;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 3px rgba(179, 23, 78, 0.1);
        }
        
        .btn-login-form {
            width: 100%;
            padding: 0.8rem;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-login-form:hover:not(:disabled) {
            background: var(--brand-primary-dark);
            box-shadow: 0 4px 12px rgba(179, 23, 78, 0.3);
        }
        
        .btn-login-form:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: none;
            border: 1px solid #f5c6cb;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: none;
            border: 1px solid #c3e6cb;
        }
        
        .login-step {
            width: 100%;
        }
        
        .step-indicator {
            margin-bottom: 2rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .step {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
        }
        
        .step.active {
            background: var(--brand-primary);
        }
        
        .recaptcha-container {
            margin-bottom: 1rem;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
            }
            
            .login-left {
                min-height: 200px;
                padding: 2rem 1rem;
            }
            
            .login-left h1 {
                font-size: 1.8rem;
            }
            
            .login-right {
                padding: 1rem;
                min-height: 100vh;
            }
        }
    </style>
</head>
<body style="background: white; margin: 0; padding: 0;">

<div class="login-container">
    <!-- Left Side - Branding -->
    <div class="login-left">
        <div style="font-size: 4rem; margin-bottom: 1rem;">✨</div>
        <h1>VOGX</h1>
        <p>Premium beauty services at your doorstep. Book trusted professionals today!</p>
    </div>
    
    <!-- Right Side - Login Form -->
    <div class="login-right">
        <div class="login-form">
            <div id="errorMessage" class="error"></div>
            <div id="successMessage" class="success"></div>
            
            <!-- Phone Step -->
            <div id="phoneStep" class="login-step">
                <h2>Welcome Back</h2>
                <p>Enter your phone number to continue</p>
                
                <div class="step-indicator">
                    <div class="step active"></div>
                    <div class="step"></div>
                </div>
                
                <form onsubmit="handlePhoneSubmit(event)">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="+91 9876543210" required>
                    </div>
                    <div id="recaptcha-container" class="recaptcha-container"></div>
                    <button type="submit" class="btn-login-form" id="sendOtpBtn">
                        <span id="sendOtpText">Send OTP</span>
                        <div id="sendOtpLoader" class="loading" style="display: none;"></div>
                    </button>
                </form>
                
                <p style="text-align: center; font-size: 0.9rem; color: var(--text-muted); margin-top: 1rem;">
                    New to VOGX? <span onclick="scrollToForm()" style="color: var(--brand-primary); cursor: pointer; font-weight: 600;">Sign Up</span>
                </p>
            </div>
            
            <!-- OTP Verification Step -->
            <div id="otpStep" class="login-step" style="display: none;">
                <h2>Verify OTP</h2>
                <p id="otpPhone" style="margin-bottom: 2rem;">Sent to +91 XXXXXXXXXX</p>
                
                <div class="step-indicator">
                    <div class="step active"></div>
                    <div class="step active"></div>
                </div>
                
                <form onsubmit="handleOTPSubmit(event)">
                    <div class="form-group">
                        <label>Enter OTP</label>
                        <div class="otp-inputs" id="otpInputs">
                            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                            <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-login-form" id="verifyOtpBtn">
                        <span id="verifyOtpText">Verify & Continue</span>
                        <div id="verifyOtpLoader" class="loading" style="display: none;"></div>
                    </button>
                </form>
                
                <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 1rem;">
                    Didn't receive? <span onclick="resendOTP()" style="color: var(--brand-primary); cursor: pointer; font-weight: 600;">Resend OTP</span>
                </p>
                <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem;">
                    <span onclick="goBackToPhone()" style="color: var(--brand-primary); cursor: pointer; font-weight: 600;">Back</span>
                </p>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDK - Load first -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<script>
    // Wait for Firebase SDK to load with better error handling
    function waitForFirebase() {
        return new Promise((resolve, reject) => {
            let attempts = 0;
            const maxAttempts = 200; // 10 seconds timeout (200 * 50ms)
            
            const checkFirebase = () => {
                attempts++;
                
                if (typeof firebase !== 'undefined' && firebase.app) {
                    console.log('✓ Firebase SDK loaded after', attempts * 50, 'ms');
                    resolve();
                } else if (attempts >= maxAttempts) {
                    console.error('Firebase SDK failed to load after', attempts * 50, 'ms');
                    reject(new Error('Firebase SDK failed to load from CDN'));
                } else {
                    setTimeout(checkFirebase, 50);
                }
            };
            
            checkFirebase();
        });
    }

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "{{ FIREBASE_API_KEY }}",
        authDomain: "{{ FIREBASE_AUTH_DOMAIN }}",
        projectId: "{{ FIREBASE_PROJECT_ID }}",
        storageBucket: "{{ FIREBASE_STORAGE_BUCKET }}",
        messagingSenderId: "{{ FIREBASE_MESSAGING_SENDER_ID }}",
        appId: "{{ FIREBASE_APP_ID }}"
    };

    let auth = null;
    let currentPhone = '';
    let verificationId = '';
    let confirmationResult = null;

    // Initialize Firebase when SDK is ready
    waitForFirebase()
        .then(() => {
            console.log('Initializing Firebase with config...');
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                console.log('✓ Firebase app initialized');
            } else {
                console.log('Firebase app already initialized');
            }
            auth = firebase.auth();
            auth.settings.appVerificationDisabledForTesting = false;
            console.log('✓ Firebase auth configured');
            
            // Enable event listener on phone input after Firebase is ready
            const phoneInput = document.getElementById('phone');
            if (phoneInput) {
                phoneInput.disabled = false;
            }
        })
        .catch((error) => {
            console.error('❌ Firebase initialization failed:', error);
            const errorEl = document.getElementById('errorMessage');
            if (errorEl) {
                errorEl.textContent = 'Failed to initialize Firebase. Please refresh the page.';
                errorEl.style.display = 'block';
            }
        });


    // ==================== UI FUNCTIONS ====================

    function showStep(stepId) {
        document.querySelectorAll('.login-step').forEach(step => {
            step.style.display = 'none';
        });
        document.getElementById(stepId).style.display = 'block';
        clearMessages();
    }

    function clearMessages() {
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';
    }

    function showError(message) {
        const errorEl = document.getElementById('errorMessage');
        errorEl.textContent = message;
        errorEl.style.display = 'block';
        console.error('Error:', message);
    }

    function showSuccess(message) {
        const successEl = document.getElementById('successMessage');
        successEl.textContent = message;
        successEl.style.display = 'block';
    }

    // ==================== PHONE AUTHENTICATION ====================

    async function handlePhoneSubmit(e) {
        e.preventDefault();
        
        if (!auth) {
            showError('Firebase is still initializing. Please wait...');
            return;
        }
        
        const phone = document.getElementById('phone').value;
        currentPhone = phone;

        // Show loading
        document.getElementById('sendOtpBtn').disabled = true;
        document.getElementById('sendOtpText').style.display = 'none';
        document.getElementById('sendOtpLoader').style.display = 'inline-block';

        try {
            clearMessages();
            
            // Normalize phone number
            let formattedPhone = phone.replace(/\D/g, '');
            if (!formattedPhone.startsWith('91')) {
                formattedPhone = '91' + formattedPhone.slice(-10);
            }
            formattedPhone = '+' + formattedPhone;

            // Create reCAPTCHA verifier
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'invisible',
                'callback': (response) => {
                    console.log('reCAPTCHA verified');
                }
            });

            // Send OTP via Firebase
            confirmationResult = await auth.signInWithPhoneNumber(formattedPhone, window.recaptchaVerifier);
            verificationId = confirmationResult.verificationId;

            document.getElementById('otpPhone').textContent = `Sent to ${formattedPhone}`;
            showStep('otpStep');
            showSuccess('OTP sent successfully!');
            
            // Auto-focus first OTP input
            setTimeout(() => {
                document.querySelector('.otp-input').focus();
            }, 100);
        } catch (error) {
            console.error('Error sending OTP:', error);
            let errorMessage = error.message || 'Failed to send OTP. Please try again.';
            
            // Handle specific Firebase errors
            if (error.code === 'auth/too-many-requests') {
                errorMessage = 'Too many requests. Please try again later.';
            } else if (error.code === 'auth/invalid-phone-number') {
                errorMessage = 'Invalid phone number. Please check and try again.';
            }
            
            showError(errorMessage);
        } finally {
            // Hide loading
            document.getElementById('sendOtpBtn').disabled = false;
            document.getElementById('sendOtpText').style.display = 'inline';
            document.getElementById('sendOtpLoader').style.display = 'none';
        }
    }

    async function handleOTPSubmit(e) {
        e.preventDefault();
        
        if (!auth) {
            showError('Firebase is still initializing. Please wait...');
            return;
        }
        
        const otpInputs = document.querySelectorAll('.otp-input');
        const otp = Array.from(otpInputs).map(input => input.value).join('');

        if (otp.length !== 6) {
            showError('Please enter a valid 6-digit OTP');
            return;
        }

        // Show loading
        document.getElementById('verifyOtpBtn').disabled = true;
        document.getElementById('verifyOtpText').style.display = 'none';
        document.getElementById('verifyOtpLoader').style.display = 'inline-block';

        try {
            clearMessages();
            
            // Verify OTP with Firebase
            const credential = firebase.auth.PhoneAuthProvider.credential(verificationId, otp);
            const result = await auth.signInWithCredential(credential);
            
            // Get Firebase ID token
            const idToken = await result.user.getIdToken();

            // Get CSRF token from meta tag
            const csrfToken = document.querySelector('meta[name="csrftoken"]').getAttribute('content');

            // Send ID token to Django backend
            const response = await fetch('/api/auth/verify-firebase-token/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({
                    idToken: idToken,
                    name: result.user.phoneNumber
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || errorData.error || 'Authentication failed');
            }

            const data = await response.json();

            if (data.token) {
                // Save token to localStorage with correct key that api.js expects
                localStorage.setItem('auth_token', data.token);
                
                // Show success message
                showSuccess('Login successful! Redirecting...');
                
                // Redirect to home page after 1.5 seconds
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            }
        } catch (error) {
            console.error('Error verifying OTP:', error);
            let errorMessage = error.message || 'Invalid OTP. Please try again.';
            
            if (error.code === 'auth/invalid-verification-code') {
                errorMessage = 'Invalid OTP. Please check and try again.';
            } else if (error.code === 'auth/code-expired') {
                errorMessage = 'OTP expired. Please request a new one.';
            }
            
            showError(errorMessage);
        } finally {
            // Hide loading
            document.getElementById('verifyOtpBtn').disabled = false;
            document.getElementById('verifyOtpText').style.display = 'inline';
            document.getElementById('verifyOtpLoader').style.display = 'none';
        }
    }

    // ==================== HELPER FUNCTIONS ====================

    function goBackToPhone() {
        showStep('phoneStep');
        // Clear OTP inputs
        document.querySelectorAll('.otp-input').forEach(input => {
            input.value = '';
        });
    }

    function resendOTP() {
        // Reset to phone entry
        goBackToPhone();
        showSuccess('You can now request a new OTP');
        document.getElementById('phone').focus();
    }

    function scrollToForm() {
        // For signup in future, for now just show phone step
        showStep('phoneStep');
        document.getElementById('phone').focus();
    }

    // ==================== OTP INPUT AUTO-FOCUS SETUP ====================

    document.addEventListener('DOMContentLoaded', () => {
        const otpInputs = document.querySelectorAll('.otp-input');
        
        otpInputs.forEach((input, index) => {
            // Handle backspace
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value === '' && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            // Handle input and auto-focus next
            input.addEventListener('input', (e) => {
                // Remove non-numeric characters
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            
            // Prevent non-numeric input
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Focus first phone input when page loads
        const phoneInput = document.getElementById('phone');
        if (phoneInput) {
            phoneInput.focus();
        }
    });
</script>

</body>
</html>
