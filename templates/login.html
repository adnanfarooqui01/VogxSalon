{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VOGX Salon</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>
    <div class="container">
        <div class="logo">VOGX Salon</div>
        <nav>
            <a href="/">Home</a>
        </nav>
    </div>
</header>

<main style="min-height:calc(100vh - 200px); display:flex; align-items:center;">
    <div class="container">
        <div style="max-width:400px; margin:0 auto;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Login to VOGX</h2>
                </div>
                <div class="card-body">
                    <div id="alerts"></div>

                    <!-- Phone Login Step -->
                    <div id="phoneStep">
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="Enter 10-digit mobile number" maxlength="15">
                        </div>
                        <button class="btn btn-primary btn-full" onclick="requestOTP()">Get OTP</button>
                        <p class="text-muted text-center mt-2" style="font-size:0.9rem;">Enter your phone number to receive an OTP</p>
                    </div>

                    <!-- OTP Verification Step -->
                    <div id="otpStep" style="display:none;">
                        <div class="form-group">
                            <label for="otp">Enter OTP</label>
                            <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6">
                        </div>
                        <div class="form-group">
                            <label for="name">Name (if new user)</label>
                            <input type="text" id="name" placeholder="Your full name">
                        </div>
                        <button class="btn btn-primary btn-full" onclick="verifyOTP()">Verify & Login</button>
                        <button class="btn btn-secondary btn-full mt-2" onclick="backToPhone()">Back</button>
                        <p class="text-muted text-center mt-2" style="font-size:0.9rem;">OTP sent to your phone</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <p>&copy; 2026 VOGX Salon. All rights reserved.</p>
    </div>
</footer>

<script src="{% static 'js/api.js' %}"></script>
<script>
    let currentPhone = '';

    function addAlert(message, type = 'success') {
        const alertsDiv = document.getElementById('alerts');
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-${type}`;
        alertDiv.textContent = message;
        alertsDiv.innerHTML = '';
        alertsDiv.appendChild(alertDiv);
    }

    async function requestOTP() {
        const phone = document.getElementById('phone').value.trim();
        
        if (!phone || phone.length < 10) {
            addAlert('Please enter a valid 10-digit phone number', 'error');
            return;
        }

        try {
            const response = await api.phoneLogin(phone);
            currentPhone = phone;
            addAlert('OTP sent successfully!', 'success');
            
            // Show OTP step
            document.getElementById('phoneStep').style.display = 'none';
            document.getElementById('otpStep').style.display = 'block';
            document.getElementById('otp').focus();
        } catch (error) {
            addAlert(`Error: ${error.message}`, 'error');
        }
    }

    async function verifyOTP() {
        const otp = document.getElementById('otp').value.trim();
        const name = document.getElementById('name').value.trim();

        if (!otp || otp.length !== 6) {
            addAlert('Please enter a valid 6-digit OTP', 'error');
            return;
        }

        try {
            const response = await api.verifyOTP(currentPhone, otp, name);
            api.setToken(response.token);
            addAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        } catch (error) {
            addAlert(`Error: ${error.message}`, 'error');
        }
    }

    function backToPhone() {
        document.getElementById('otpStep').style.display = 'none';
        document.getElementById('phoneStep').style.display = 'block';
        document.getElementById('phone').focus();
    }

    // Check if already logged in
    if (api.token) {
        window.location.href = '/';
    }
</script>

</body>
</html>
